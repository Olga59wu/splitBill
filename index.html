<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 分帳小幫手</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">

    <div id="login-app" class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8 text-center" v-cloak>
        
        <!-- 載入中狀態遮罩 -->
        <div v-if="isCheckingAuth" class="py-12">
            <svg class="animate-spin h-8 w-8 text-indigo-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="mt-4 text-gray-500 font-medium">系統驗證中...</p>
        </div>

        <!-- 登入介面 -->
        <div v-else>
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                💰
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">分帳小幫手</h1>
            <p class="text-gray-500 mb-8">管理同行夥伴的花費，雲端保存您的所有歷史紀錄。</p>

            <button 
                @click="signIn" 
                :disabled="isProcessing"
                class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 shadow-sm text-gray-700 hover:bg-gray-50 disabled:opacity-50 px-4 py-3 rounded-xl font-medium transition"
            >
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span v-if="!isProcessing">使用 Google 帳號登入</span>
                <span v-else>登入處理中...</span>
            </button>
            <p class="mt-4 text-xs text-gray-400">此系統為封閉式服務，必須登入後方可使用功能。</p>
        </div>
    </div>

    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <script type="module">
        import { auth, provider } from './firebase-config.js';
        import { signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const isCheckingAuth = ref(true);
                const isProcessing = ref(false);

                onMounted(() => {
                    if (!auth) {
                        alert("Firebase 尚未正確設定，請確認 firebase-config.js");
                        isCheckingAuth.value = false;
                        return;
                    }
                    
                    // 聽取認證狀態
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            // 若使用者已登入，直接導入系統
                            window.location.href = './split_bill.html';
                        } else {
                            // 未登入，顯示登入按鈕
                            isCheckingAuth.value = false;
                        }
                    });
                });

                const signIn = async () => {
                    if (!auth) return;
                    isProcessing.value = true;
                    try {
                        await signInWithPopup(auth, provider);
                        // 登入成功後，onAuthStateChanged 會偵測到並自動跳轉
                    } catch (error) {
                        console.error('登入失敗:', error);
                        alert('登入失敗，請重試！');
                        isProcessing.value = false;
                    }
                };

                return {
                    isCheckingAuth,
                    isProcessing,
                    signIn
                };
            }
        }).mount('#login-app');
    </script>

</body>
</html>
