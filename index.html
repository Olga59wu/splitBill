<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登入 - 分帳小幫手</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        [v-cloak] {
            display: none;
        }

        .toast-enter-active,
        .toast-leave-active {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast-enter-from,
        .toast-leave-to {
            opacity: 0;
            transform: translateY(20px) translateX(-50%);
        }

        .toast-enter-to,
        .toast-leave-from {
            opacity: 1;
            transform: translateY(0) translateX(-50%);
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4 transition-colors duration-500 selection:bg-emerald-100 selection:text-emerald-900 dark:selection:bg-emerald-900/50 dark:selection:text-emerald-100">

    <div id="login-app"
        class="w-full max-w-sm bg-white dark:bg-slate-900 rounded-xl shadow-[0_8px_40px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_40px_rgb(0,0,0,0.5)] border border-slate-100 dark:border-slate-800 p-8 md:p-10 text-center transition-all relative overflow-hidden"
        v-cloak>

        <!-- Toast 訊息框 -->
        <transition name="toast">
            <div v-if="toastMsg"
                class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-5 py-3 bg-slate-900 dark:bg-slate-800 border border-slate-700 dark:border-slate-600 text-white text-sm font-semibold rounded-2xl shadow-[0_10px_40px_rgb(0,0,0,0.2)] flex items-center gap-3">
                <span class="text-base">🔔</span> {{ toastMsg }}
            </div>
        </transition>

        <!-- 載入中狀態遮罩 -->
        <div v-if="isCheckingAuth" class="py-12 flex flex-col items-center">
            <svg class="animate-spin h-10 w-10 text-slate-900 dark:text-white mb-6" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24">
                <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-80" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="text-slate-500 dark:text-slate-400 font-medium tracking-wide text-sm animate-pulse">連線至安全中心...</p>
        </div>

        <!-- 登入介面 -->
        <div v-else>
            <div
                class="w-20 h-20 bg-slate-50 dark:bg-slate-800/50 rounded-xl flex items-center justify-center mx-auto mb-8 shadow-inner border border-slate-100/50 dark:border-slate-700/50 text-4xl">
                💳
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-3 tracking-tight">分帳小幫手</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-10 leading-relaxed font-medium">
                記錄與同伴的每筆花費。<br>雲端同步，帳目清晰透明。</p>

            <button @click="signIn" :disabled="isProcessing"
                class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm text-slate-700 dark:text-slate-200 hover:shadow-md hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700/50 disabled:opacity-50 px-4 py-3.5 rounded-lg font-semibold transition-all duration-300 active:scale-[0.98]">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                <span v-if="!isProcessing">透過 Google 授權登入</span>
                <span v-else>安全驗證中...</span>
            </button>
            <p class="mt-6 text-[11px] text-slate-400 dark:text-slate-500 font-medium tracking-wide">嚴密保護您的交易隱私與歷史報表</p>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <script type="module">
        import { auth, provider, db } from './firebase-config.js';
        import { signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const isCheckingAuth = ref(true);
                const isProcessing = ref(false);
                const toastMsg = ref('');

                const showToast = (msg) => { toastMsg.value = msg; setTimeout(() => { toastMsg.value = ''; }, 3000); };

                onMounted(() => {
                    if (!auth) {
                        showToast("通訊配置異常。");
                        isCheckingAuth.value = false;
                        return;
                    }
                    const urlParams = new URLSearchParams(window.location.search);
                    const inviteId = urlParams.get('invite');

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            let hasAccess = false;
                            const ADMIN_EMAILS = ['olga59.wu@gmail.com', 'chipang59@gmail.com'];
                            if (user.email && ADMIN_EMAILS.includes(user.email)) {
                                hasAccess = true;
                            } else if (user.email && db) {
                                try {
                                    const snap = await getDoc(doc(db, 'whitelist', user.email));
                                    hasAccess = snap.exists();
                                } catch (e) {
                                    console.error("Whitelist check failed", e);
                                }
                            }

                            if (!hasAccess) {
                                await signOut(auth);
                                showToast('抱歉，此系統為私人封閉環境，您的信箱未在授權白名單內。');
                                isCheckingAuth.value = false;
                                return;
                            }

                            if (inviteId) { window.location.href = `./split_bill.html?view=${inviteId}`; }
                            else { window.location.href = './split_bill.html'; }
                        } else {
                            isCheckingAuth.value = false;
                        }
                    });
                });

                const signIn = async () => {
                    if (!auth) return;
                    isProcessing.value = true;
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (error) {
                        console.error('登入失敗:', error);
                        showToast('登入程序中斷，請重試！');
                        isProcessing.value = false;
                    }
                };

                return { isCheckingAuth, isProcessing, signIn, toastMsg };
            }
        }).mount('#login-app');
    </script>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(e => { }); }); }
    </script>
</body>

</html>
